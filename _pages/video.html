<style>
.youtube-card {

.youtube-grid {

.youtube-container {

}

.youtube-container iframe {

    inset: 0;
    width: 100%;
    height: 100%;
    border: 0;
}


/* Tablet */
@media (max-width: 900px) {
    .youtube-grid {
        grid-template-columns: repeat(2, 1fr);
    }
}


/* Mobile */
@media (max-width: 600px) {

    .youtube-card {
        margin: 15px auto;
        border-radius: 0;
        box-shadow: none;
    }

    .youtube-grid {
        grid-template-columns: 1fr;
        gap: 20px;
    }
}
