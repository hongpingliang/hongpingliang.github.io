{% include base_path %}

<div id="stats"></div>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
const M=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"],KM=.621371;

fetch("/files/runs/activities.csv").then(r=>r.text()).then(csv=>{

 let rows=Papa.parse(csv,{header:true,skipEmptyLines:true}).data,
     data={},grand=0,half=0;

    rows = rows.filter(r => {
        const d = new Date(r["Activity Date"]);
        return !isNaN(d) && d.getFullYear() >= 2023;
    });     

 rows.forEach(r=>{
  if(!r["Activity Date"])return;
  let d=new Date(r["Activity Date"]);
  if(isNaN(d))return;

  let y=d.getFullYear(),m=M[d.getMonth()],
      mi=(parseFloat(r.Distance)||0)*KM,
      w=Math.min(51,Math.floor((d-new Date(y,0,1))/86400000/7));
  
  if(mi>=13.1) half++;

  if(!data[y])
    data[y]={total:0,weeks:Array(52).fill(0),months:Object.fromEntries(M.map(x=>[x,0]))};

  data[y].total+=mi;
  data[y].weeks[w]+=mi;
  data[y].months[m]+=mi;
  grand+=mi;
 });

 let html=`
 <div style="max-width:1100px;margin:auto;font-family:Arial,sans-serif">
 <div style="text-align:center;font-size:48px;font-weight:bold;color:#1976d2">${grand.toFixed(1)} Miles</div>
 <div style="text-align:center;color:#666;margin-bottom:30px"> ${rows.length} Runs • ${half} Half Marathons • ${Object.keys(data).length} Years</div>`;

 Object.keys(data).sort((a,b)=>b-a).forEach(y=>{
  html+=`
  <div style="margin:35px 0;padding:20px;border-radius:12px;background:#fff;box-shadow:0 2px 8px #0002">
   <h2 style="margin:0 0 15px">${y}<span style="float:right;color:#1976d2">${data[y].total.toFixed(1)} mi</span></h2>
   <canvas id="c${y}" height="110"></canvas>
   <table style="width:100%;margin-top:20px;border-collapse:collapse">
    <tr style="background:#1976d2;color:#fff"><th>Month</th><th>Miles</th></tr>
    ${M.slice(0,y==2026?6:12).map((m,i)=>`<tr style="background:${i%2?"#f7f7f7":"#fff"}"><td style="padding:6px">${m}</td><td style="padding:6px;text-align:right">${data[y].months[m].toFixed(1)}</td></tr>`).join("")}
    <tr style="font-weight:bold;background:#eee"><td style="padding:6px">Total</td><td style="padding:6px;text-align:right">${data[y].total.toFixed(1)}</td></tr>
   </table>
  </div>`;
 });

 html+="</div>";
 stats.innerHTML=html;

 Object.keys(data).sort((a,b)=>b-a).forEach(y=>{
  new Chart(document.getElementById("c"+y),{
   type:"bar",
   data:{
    labels:Array.from({length:52},(_,i)=>i+1),
    datasets:[{data:data[y].weeks,backgroundColor:"#42a5f5"}]
   },
    title:{
    display:true,
    text:`${y} Weekly Mileage`
    },   
   options:{
    responsive:true,
    plugins:{
    legend:{display:false},
    title:{
    display:true,
    text:"Weekly Mileage"
    }
    },
    scales:{
    x:{
    title:{display:true,text:"Week"},
    grid:{display:false},
    ticks:{maxTicksLimit:13}
    },
    y:{
    beginAtZero:true,
    title:{display:true,text:"Miles"}
    }
    }
    }
  });
 });

});
</script>

<h2>⭐ Runs</h2>

<div id="favorite-runs"></div>

<script>
async function loadFavoriteRuns() {
    const csv = await fetch("/files/runs/activities.csv").then(r => r.text());

    Papa.parse(csv,{
        header:true,
        quoteChar:'"',
        escapeChar:'"',
        skipEmptyLines:true,
        complete:function(results){

            const favorites=results.data.filter(r=>String(r["Is_Favorite"]).trim()=="1");
            favorites.sort((a,b)=>new Date(b["Activity Date"])-new Date(a["Activity Date"]));

            const container=document.getElementById("favorite-runs");

            favorites.forEach(run=>{
                const miles=(parseFloat(run["Distance"])*0.621371).toFixed(1);
                const date=run["Activity Date"].split(" ").slice(0,3).join(" ");

                const card=document.createElement("a");
                card.className="favorite-run";
                card.href="/run/?id="+run["Activity ID"];

                card.innerHTML=
                    '<img src="/files/runs/png/'+run["Activity ID"]+'.png" alt="'+run["Activity Name"]+'" loading="lazy">'+
                    '<div class="favorite-info">'+
                        '<div class="favorite-title">'+run["Activity Name"]+'</div>'+
                        '<div class="favorite-meta">'+
                            '<span>'+miles+' miles</span>'+
                            '<span><i>'+date+'</i></span>'+
                        '</div>'+ 
                    '</div>';

                container.appendChild(card);
            });
        }
    });
}

loadFavoriteRuns();
</script>

<style>
#favorite-runs{display:flex;flex-direction:column;gap:20px;margin-top:20px;}
.favorite-run{display:flex;gap:20px;align-items:center;border:1px solid #ddd;border-radius:10px;padding:15px;background:#fff;color:inherit;text-decoration:none;transition:box-shadow .2s,transform .2s;}
.favorite-run:hover{box-shadow:0 4px 12px rgba(0,0,0,.15);transform:translateY(-2px);}
.favorite-run img{width:280px;flex-shrink:0;display:block;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,.15);}
.favorite-run:hover .favorite-title{text-decoration:underline;}
.favorite-info{flex:1;}
.favorite-title{font-size:1.3em;font-weight:bold;margin-bottom:12px;}
.favorite-mile{font-size:1.1em;margin-bottom:6px;}
.favorite-info div{margin-bottom:6px;}
@media(max-width:700px){
    .favorite-run{flex-direction:column;align-items:flex-start;}
    .favorite-run img{width:100%;}
}
.favorite-meta{
    margin-top:auto;          /* Pushes this line to the bottom */
    display:flex;
    justify-content:space-between;
    color:#666;
    font-size:0.9em;
}
</style>
