---
layout: default
title: "Fractal"
permalink: /fractal/
author_profile: false
---

{% include base_path %}

<style>
  #fractal_canvas {
    width: 100%;
    max-width: 600px;
    height: auto;
    border: 1px solid #333;
    background: #fff;
  }

  .control-panel {
    max-height: 85vh;
    overflow-y: auto;
  }

  .btn-group .btn {
    margin: 6px;
    width: 80px;
  }

  .section-title {
    font-weight: 600;
    margin-top: 15px;
  }

  canvas.small-preview {
    border: 1px solid #ccc;
    width: 100px;
    height: 100px;
  }
</style>


<div class="container-fluid py-2">

  <div class="row">

    <!-- LEFT: CANVAS -->
    <div class="col-12 col-lg-7 mb-3">

      <div class="card shadow-sm mb-3">
        <div class="card-body text-center">
            <div id="fractalBox" class="d-inline-block"></div>
        </div>
      </div>

      <div class="card shadow-sm mb-3">
        <div class="card-body">

          <h6 class="section-title">Fractals</h6>
          <div class="d-flex align-items-center gap-4">
            <button class="btn btn-info btn-sm" onclick="Index.drawMandelbrot();" style="width:100px;">Mandelbrot</button>
            <button class="btn btn-info btn-sm" onclick="Index.drawDNA();" style="width:100px;">DNA</button>
          </div>

          <h6 class="section-title">Chaos Game</h6>
          <div class="d-flex align-items-center gap-4">
            <button class="btn btn-info btn-sm" onclick="Index.setNumOfVertices(3);" style="width:60px;">3</button>
            <button class="btn btn-info btn-sm" onclick="Index.setNumOfVertices(4);" style="width:60px;">4</button>
            <button class="btn btn-info btn-sm" onclick="Index.setNumOfVertices(5);" style="width:60px;">5</button>
            <button class="btn btn-info btn-sm" onclick="Index.setNumOfVertices(6);" style="width:60px;">6</button>
            <button class="btn btn-info btn-sm" onclick="Index.setNumOfVertices(7);" style="width:60px;">7</button>
            <button class="btn btn-info btn-sm" onclick="Index.setNumOfVertices(8);" style="width:60px;">8</button>
            <button class="btn btn-info btn-sm" onclick="Index.setNumOfVertices(12);" style="width:60px;">12</button>
          </div>
        </div>
      </div>      

      <div class="card shadow-sm">
        <div class="card-body">
            <div class="d-flex align-items-center gap-2">
                
                <div id="ifs_list"></div>
            </div>
        </div>
      </div>
    </div>

    <!-- RIGHT: CONTROLS -->
    <div class="col-12 col-lg-5 control-panel">

      <div class="card shadow-sm mb-3">
        <div class="card-body">

            <div class="d-flex align-items-center gap-2">
                Width: <input id="width" value="300" placeholder="width" class="form-control" style="width:100px;">
                Height: <input id="height" value="300" placeholder="height" class="form-control" style="width:100px;">
                <button class="btn btn-info" onclick="Index.resize();">Update</button>
                &nbsp; 
                <input type="checkbox" checked onclick="Index.setSingleColor();">Multi Color
            </div>

          <h6 class="section-title">Color</h6>
          <div class="d-flex align-items-center gap-4">
            <button class="btn btn-info btn-sm" onclick="Index.setGraphColor(1, new RGB(255,255,255,1));" style="width:80px;">White</button>
            <button class="btn btn-info btn-sm" onclick="Index.setGraphColor(1, new RGB(0,0,0,1));" style="width:80px;">Black</button>
            <button class="btn btn-info btn-sm" onclick="Index.setGraphColor(1, new RGB(0,0,255,1));" style="width:80px;">Blue</button>
            <button class="btn btn-info btn-sm" onclick="Index.setGraphColor(2);" style="width:80px;">Image</button>
            <button class="btn btn-info btn-sm" onclick="Index.setGraphColor(3);" style="width:80px;">Gradient</button>
          </div>

          <h6 class="section-title">Background</h6>
          <div class="d-flex align-items-center gap-4">
            <button class="btn btn-info btn-sm" onclick="Index.setBgColor(1, new RGB(0,0,0,1));" style="width:80px;">Black</button>
            <button class="btn btn-info btn-sm" onclick="Index.setBgColor(1, new RGB(255,255,255,1));" style="width:80px;">White</button>
            <button class="btn btn-info btn-sm" onclick="Index.setBgColor(2);" style="width:80px;">Image</button>
            <button class="btn btn-info btn-sm" onclick="Index.setBgColor(3);" style="width:80px;">Gradient</button>
          </div>

        </div>
      </div>

      <div class="card shadow-sm mb-3">
        <div class="card-body">

          <h6 class="section-title">Images</h6>

          Foreground: 
          <input type="file" class="form-control-file" accept="image/*" onchange="Index.loadImage(event, 'foregroundImage')"><br/>
          <canvas id="foregroundImage" class="small-preview"></canvas><br/><br/>

          Background: 
          <input type="file" class="form-control-file" accept="image/*" onchange="Index.loadImage(event, 'backgroundImage')"><br/>
          <canvas id="backgroundImage" class="small-preview"></canvas>

        </div>
      </div>

      <div class="card shadow-sm mb-3">
        <div class="card-body">
          <h6 class="section-title">IFS Controls</h6>
          <!-- div class="btn-group">
            <button class="btn btn-info btn-sm" onclick="Index.updateIFSValue(-1);">-</button>
            <button class="btn btn-info btn-sm" onclick="Index.updateIFSValue(1);">+</button>
            <button class="btn btn-info btn-sm" onclick="Index.animateIFS();">Animate</button>
          </div -->
          <div id="control_ui" class="mt-3"></div>
        </div>
      </div>

    </div>

  </div>

</div>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.j"></script>
<script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.j"></script>
<script src="{{ base_path }}/assets/js/fractal_core.js"></script>
<script src="{{ base_path }}/assets/js/fractal_widget.js"></script>
<script>
  FractalWidget.create({
    container: "#fractalBox",
    width: 600,
    height: 600,
    mode: "mandelbrot"
  });
</script>
