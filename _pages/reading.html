{% include base_path %}

<style>
#book-list {
    max-width: 900px;
    margin: auto;
}

.book-card {
    position: relative;
    display: flex;
    gap: 25px;
    padding: 20px;
    margin: 15px 0;
    border-radius: 12px;
    background: #fafafa;
    box-shadow: 0 3px 10px rgba(0,0,0,.15);
}

.cover {
    width: 140px;
    height: 210px;
    object-fit: cover;
    border-radius: 10px;
    box-shadow: 0 5px 15px rgba(0,0,0,.25);
    transition: transform .2s;
}

.cover:hover {
    transform: scale(1.05);
}

.info {
    flex: 1;
    font-size: 16px;
    line-height: 1.8;
}

.title {
    font-size: 28px;
    font-weight: bold;
    margin-bottom: 12px;
}

.number {
    position: absolute;
    right: 15px;
    bottom: 10px;
    font-size: 20px;
    font-weight: bold;
    color: #999;
    opacity: .35;
}

@media(max-width:600px) {
    .book-card {
        flex-direction: column;
        align-items: center;
    }

    .title {
        font-size: 24px;
    }

    .info {
        text-align: center;
    }
}
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

<div id="book-list"></div>

<script>
async function loadBookList() {
    const response = await fetch("/files/read_list.csv");
    const csv = await response.text();

    let books = Papa.parse(csv, {
        header: true,
        skipEmptyLines: true
    }).data;

    books = books
        .filter(b => b.activity && b.activity.trim() === "Borrowed")
        .filter(b => b.isbn);

    books = [...new Map(
        books.map(b => [b.isbn, b])
    ).values()];
    
    books.sort((a, b) =>
        new Date(b.timestamp) - new Date(a.timestamp)
    );

    const html = books.map((b, i) =>
        '<div class="book-card">' +
        '<img class="cover" src="' + b.cover + '" alt="book cover" loading="lazy">' +
        '<div class="info">' +
        '<div class="title">' + (b.title || '') + '</div>' +
        '<div><i>' + (b.author || '') + '</i></div>' +
        '<div><b>Read:</b> ' + formatDate(b.timestamp) + '</div>' +
        '</div>' +
        '<div class="number">' + (books.length - i) + '</div>' +
        '</div>'
    ).join("");

    document.getElementById("book-list").innerHTML = html;
}

function formatDate(timestamp) {
    if (!timestamp) return "";

    const parts = timestamp.split(" ");
    return parts.length >= 3 ? parts.slice(0, 3).join(" ") : timestamp;
}

loadBookList();
</script>
