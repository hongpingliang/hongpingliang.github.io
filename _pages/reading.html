---
layout: archive
title: "My Read List"
permalink: /reading/
author_profile: true
---

{% include base_path %}

<style>
#book-list{max-width:900px;margin:auto}
.book-card{position:relative;display:flex;gap:25px;padding:20px;margin:15px 0;border-radius:12px;background:#fafafa;box-shadow:0 3px 10px rgba(0,0,0,.15)}
.cover{width:140px;height:210px;object-fit:cover;border-radius:10px;box-shadow:0 5px 15px rgba(0,0,0,.25);transition:.2s}
.cover.audio{width:100px;height:150px}
.cover:hover{transform:scale(1.05)}
.info{flex:1;font-size:16px;line-height:1.8}
.title{font-size:28px;font-weight:bold}
.number{position:absolute;right:15px;bottom:10px;font-size:20px;font-weight:bold;color:#999;opacity:.35}
@media(max-width:600px){.book-card{flex-direction:column;align-items:center}.title{font-size:24px}.info{text-align:center}}
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

<h2 class="youtube-title">Favorite</h2>
<div id="book-list-favorite"></div>
<br/>

<h2 class="youtube-title">All</h2>
<div id="book-list-all"></div>

<script>
async function loadBookList(fileName, divId, isSort){
    const csv=await fetch("/files/" + fileName).then(r=>r.text());
    let books=Papa.parse(csv,{header:true,skipEmptyLines:true}).data;
    books=books.filter(b=>b.activity?.trim()=="Borrowed"&&b.isbn);
    books=[...new Map(books.map(b=>[b.isbn,b])).values()];

    if (isSort) {
        books.sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp));
    }

    document.getElementById(divId).innerHTML=books.map((b,i)=>{
        const audio=((b.format||b.media||b.type||"")+" "+(b.title||"")).toLowerCase().includes("Books on Tape");
        let displyNum = books.length-i;
        if ( divId == "book-list-favorite" ) {
            displyNum = ''
        }
        const amazon="https://www.amazon.com/s?k="+encodeURIComponent((b.title||"")+" "+(b.author||""));

        return `<div class="book-card">
            <a href="${amazon}" target="_blank" rel="noopener">
                <img class="cover${audio?' audio':''}" src="${b.cover}" alt="book cover" loading="lazy">
            </a>
            <div class="info">
                <div class="title">${b.title||""}</div>
                <div><i>${b.author||""}</i></div>
                <div><b>Read:</b> ${formatDate(b.timestamp)}</div>
            </div>
            <div class="number">${displyNum}</div>
        </div>`;
    }).join("");
}

function formatDate(ts){if(!ts)return"";const p=ts.split(" ");return p.length>=3?p.slice(0,3).join(" "):ts;}

loadBookList("read_list_favorite.csv", "book-list-favorite", false);
loadBookList("read_list.csv", "book-list-all", true);
</script>
