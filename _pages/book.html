author_profile: true

{% include base_path %}


<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

<div id="book-list"></div>

<script>
async function loadBookList() {
    const csv = await fetch("/files/read_list.csv").then(r => r.text());

    let books = Papa.parse(csv, {
        header: true,
        skipEmptyLines: true
    }).data;

    // only Borrowed books
    books = books.filter(b => b.activity === "Borrowed");

    // remove duplicate ISBN
    books = [...new Map(books.map(b => [b.isbn, b])).values()];

    // sort timestamp descending
    books.sort((a, b) =>
        new Date(b.timestamp) - new Date(a.timestamp)
    );

    // display books
    const html = books.map((b, i) => `
        <div class="book-card">
            <img class="cover" src="${b.cover}" alt="${b.title}">

            <div class="info">
                <div class="title">${b.title}</div>
                <div><b>Author:</b> ${b.author}</div>
                <div><b>Publisher:</b> ${b.publisher}</div>
                <div><b>ISBN:</b> ${b.isbn}</div>
                <div><b>Read:</b> ${b.timestamp}</div>
            </div>

            <div class="number">${books.length - i}</div>
        </div>
    `).join("");

    document.getElementById("book-list").innerHTML = html;
}

loadBookList();
</script>

<style>
#book-list {
    max-width: 900px;
    margin: auto;
}

.cover {
    width: 140px;
    height: 210px;
    object-fit: cover;
    border-radius: 10px;
    box-shadow: 0 5px 15px rgba(0,0,0,.25);
    transition: transform .2s;
}

.cover:hover {
    transform: scale(1.05);
}

.info {
    flex: 1;
    font-size: 16px;
    line-height: 1.8;
}

.book-card {
    position: relative;
    display: flex;
    gap: 25px;
    padding: 20px;
    margin: 15px 0;
    border-radius: 12px;
    background: #fafafa;
    box-shadow: 0 3px 10px rgba(0,0,0,.15);
}

.number {
    position: absolute;
    right: 15px;
    bottom: 10px;
    font-size: 20px;
    font-weight: bold;
    color: #999;
    opacity: .35;
}

.title {
    font-size: 28px;
    font-weight: bold;
    margin-bottom: 12px;
}

@media(max-width:600px) {
    .book-card {
        flex-direction: column;
        align-items: center;
    }

    .title {
        font-size: 24px;
    }

    .info {
        text-align: center;
    }
}
</style>
