<!DOCTYPE HTML>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Fractal</title>

<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">

<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
<script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>

<script src="ifs.js"></script>
<script src="index.js"></script>
<script src="config.js"></script>
<script src="fractal.js"></script>
<script src="fractal_ifs.js"></script>
<script src="fractal_mandelbrot.js"></script>
<script src="fractal_chaos_game.js"></script>
<script src="fractal_dna.js"></script>
<script src="data.js"></script>
<script src="util.js"></script>
<script src="matrix.js"></script>
<script src="fractal_factory.js"></script>
<script src="color_config.js"></script>
<script src="worker.js"></script>
<script src="ifs_data.js"></script>

<style>
  body {
    background: #f8f9fa;
  }

  #fractal_canvas {
    width: 100%;
    max-width: 600px;
    height: auto;
    border: 1px solid #333;
    background: #fff;
  }

  .control-panel {
    max-height: 85vh;
    overflow-y: auto;
  }

  .btn-group .btn {
    margin: 2px;
  }

  .section-title {
    font-weight: 600;
    margin-top: 15px;
  }

  canvas.small-preview {
    border: 1px solid #ccc;
    width: 100px;
    height: 100px;
  }
</style>

</head>

<body onload="Index.init();">

<div class="container-fluid py-2">

  <div class="row">

    <!-- LEFT: CANVAS -->
    <div class="col-12 col-lg-7 mb-3">

      <div class="card shadow-sm">
        <div class="card-body text-center">

          <canvas id="fractal_canvas"></canvas>

          <div class="form-row mt-3">
            <div class="col">
              <input id="width" class="form-control" value="300" placeholder="width">
            </div>
            <div class="col">
              <input id="height" class="form-control" value="300" placeholder="height">
            </div>
            <div class="col-auto">
              <button class="btn btn-info" onclick="Index.resize();">
                Set Size
              </button>
            </div>
          </div>

          <div class="form-check mt-2">
            <input type="checkbox" class="form-check-input" checked onclick="Index.setSingleColor();">
            <label class="form-check-label">Multi Color</label>
          </div>

        </div>
      </div>

    </div>

    <!-- RIGHT: CONTROLS -->
    <div class="col-12 col-lg-5 control-panel">

      <div class="card shadow-sm mb-3">
        <div class="card-body">

          <h6 class="section-title">Color</h6>
          <div class="btn-group flex-wrap">
            <button class="btn btn-outline-info btn-sm" onclick="Index.setGraphColor(1, new RGB(255,255,255,1));">White</button>
            <button class="btn btn-outline-info btn-sm" onclick="Index.setGraphColor(1, new RGB(0,0,0,1));">Black</button>
            <button class="btn btn-outline-info btn-sm" onclick="Index.setGraphColor(1, new RGB(0,0,255,1));">Blue</button>
            <button class="btn btn-outline-info btn-sm" onclick="Index.setGraphColor(2);">Image</button>
            <button class="btn btn-outline-info btn-sm" onclick="Index.setGraphColor(3);">Gradient</button>
          </div>

          <h6 class="section-title">Background</h6>
          <div class="btn-group flex-wrap">
            <button class="btn btn-outline-info btn-sm" onclick="Index.setBgColor(1, new RGB(0,0,0,1));">Black</button>
            <button class="btn btn-outline-info btn-sm" onclick="Index.setBgColor(1, new RGB(255,255,255,1));">White</button>
            <button class="btn btn-outline-info btn-sm" onclick="Index.setBgColor(2);">Image</button>
            <button class="btn btn-outline-info btn-sm" onclick="Index.setBgColor(3);">Gradient</button>
          </div>

        </div>
      </div>

      <div class="card shadow-sm mb-3">
        <div class="card-body">

          <h6 class="section-title">Fractals</h6>
          <div class="btn-group flex-wrap">
            <button class="btn btn-outline-info btn-sm" onclick="Index.drawMandelbrot();">Mandelbrot</button>
            <button class="btn btn-outline-info btn-sm" onclick="Index.drawDNA();">DNA</button>
          </div>

          <h6 class="section-title">Chaos Game</h6>
          <div class="btn-group flex-wrap">
            <button class="btn btn-outline-info btn-sm" onclick="Index.setNumOfVertices(3);">3</button>
            <button class="btn btn-outline-info btn-sm" onclick="Index.setNumOfVertices(4);">4</button>
            <button class="btn btn-outline-info btn-sm" onclick="Index.setNumOfVertices(5);">5</button>
            <button class="btn btn-outline-info btn-sm" onclick="Index.setNumOfVertices(6);">6</button>
            <button class="btn btn-outline-info btn-sm" onclick="Index.setNumOfVertices(7);">7</button>
            <button class="btn btn-outline-info btn-sm" onclick="Index.setNumOfVertices(8);">8</button>
            <button class="btn btn-outline-info btn-sm" onclick="Index.setNumOfVertices(12);">12</button>
          </div>

        </div>
      </div>

      <div class="card shadow-sm mb-3">
        <div class="card-body">

          <h6 class="section-title">Images</h6>

          <label>Foreground</label>
          <input type="file" class="form-control-file"
                 accept="image/*"
                 onchange="Index.loadImage(event, 'foregroundImage')">
          <canvas id="foregroundImage" class="small-preview mt-2"></canvas>

          <label class="mt-3">Background</label>
          <input type="file" class="form-control-file"
                 accept="image/*"
                 onchange="Index.loadImage(event, 'backgroundImage')">
          <canvas id="backgroundImage" class="small-preview mt-2"></canvas>

        </div>
      </div>

      <div class="card shadow-sm mb-3">
        <div class="card-body">

          <h6 class="section-title">IFS Controls</h6>

          <div class="btn-group">
            <button class="btn btn-outline-info btn-sm" onclick="Index.updateIFSValue(-1);">-</button>
            <button class="btn btn-outline-info btn-sm" onclick="Index.updateIFSValue(1);">+</button>
            <button class="btn btn-outline-info btn-sm" onclick="Index.animateIFS();">Animate</button>
          </div>

          <div id="ifs_list" class="mt-3"></div>
          <div id="control_ui" class="mt-3"></div>

        </div>
      </div>

    </div>

  </div>

</div>

</body>
</html>
